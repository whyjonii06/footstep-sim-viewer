<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Footstep FC — Visualiseur de match (local)</title>
<style>
  html, body { margin: 0; background: #0B152A; color: #fff; font-family: -apple-system, system-ui, sans-serif; }
  #top { display: flex; align-items: center; gap: 14px; padding: 8px 14px; }
  #score { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; }
  #min { color: #9CA3AF; font-size: 14px; }
  .name { font-weight: 600; font-size: 15px; }
  button { background: #1F2937; color: #fff; border: 1px solid #374151; border-radius: 8px; padding: 7px 12px; font-size: 14px; cursor: pointer; }
  button:hover { background: #374151; }
  #wrap { padding: 0 12px 12px; }
  canvas { width: 100%; height: auto; display: block; border-radius: 10px; background: #15803d; }
  #feed { min-height: 26px; padding: 8px 14px; color: #d1d5db; font-size: 15px; }
  #speed { vertical-align: middle; }
</style>
</head>
<body>
<div id="top">
  <span class="name" id="hn">Domicile</span>
  <span id="score">0 – 0</span>
  <span id="min">0'</span>
  <span class="name" id="an">Extérieur</span>
  <span style="flex:1"></span>
  <button id="cam">🔍 Vue ballon</button>
  <button id="pause">Pause</button>
  <button id="regen">↻ Nouveau match</button>
  <label style="font-size:13px;color:#9CA3AF">vitesse <input id="speed" type="range" min="0.5" max="4" step="0.5" value="1.5"></label>
</div>
<div id="wrap"><canvas id="cv" width="1050" height="680"></canvas></div>
<div id="feed"></div>

<script src="engine.js"></script>
<script>
(function () {
window.onerror = function (msg, src, line, col) {
  var f = document.getElementById('feed');
  if (f) { f.style.color = '#fca5a5'; f.textContent = '⚠️ ' + msg + '  (ligne ' + line + ':' + col + ')'; }
  return false;
};
const PW = 105, PH = 68;
const JERSEY = [1,2,5,4,3,6,8,7,11,9,10];
const HOME_COLOR = '#22C55E', AWAY_COLOR = '#EF4444';

function makeTeam(name, base, idp) {
  const layout = [['GK',1],['DEF',4],['MID',4],['ATT',2]];
  const players = []; let n = 0;
  for (const [pos, count] of layout) for (let k = 0; k < count; k++) {
    const v = Math.round(base + ((n*7)%12) - 6);
    players.push({ name: pos+n, position: pos, speed:v, stamina:v, technique:v, strength:v });
    n++;
  }
  return { name, players };
}

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;

// Caméra : en mode "suivi", on montre une fenêtre zoomée centrée sur le ballon.
let follow = false;   // défaut : vue terrain dézoomée (préférence utilisateur)
let camCX = PW / 2, camCY = PH / 2;
const FVW = 58, FVH = FVW * H / W;          // fenêtre de suivi (m) au ratio du canvas
function vw() { return follow ? FVW : PW; }
function vh() { return follow ? FVH : PH; }
function wx(x) { return (x - (camCX - vw() / 2)) * (W / vw()); }
function wy(y) { return (y - (camCY - vh() / 2)) * (H / vh()); }
function scale() { return W / vw(); }

let replay = null, startT = 0, paused = false, seed = 1;
let speed = parseFloat(document.getElementById('speed').value);

function generate() {
  const home = makeTeam('OZ Family', 58, 'h');
  const away = makeTeam('Les Lions', 54, 'a');
  const r = SimEngine.simulate(home, away, seed * 7919 + 13, 360, { record: true });
  replay = r;
  document.getElementById('hn').textContent = home.name;
  document.getElementById('an').textContent = away.name;
  startT = performance.now();
}

function drawPitch() {
  const sc = scale();
  ctx.fillStyle = '#15803d'; ctx.fillRect(0, 0, W, H);
  // bandes de pelouse
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let i = 0; i < 12; i += 2) ctx.fillRect(wx(i * PW / 12), wy(0), PW / 12 * sc, PH * sc);
  ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2;
  ctx.strokeRect(wx(0), wy(0), PW * sc, PH * sc);                       // contour
  ctx.beginPath(); ctx.moveTo(wx(PW / 2), wy(0)); ctx.lineTo(wx(PW / 2), wy(PH)); ctx.stroke(); // médiane
  ctx.beginPath(); ctx.arc(wx(PW / 2), wy(PH / 2), 9.15 * sc, 0, 7); ctx.stroke();              // rond
  ctx.beginPath(); ctx.arc(wx(PW / 2), wy(PH / 2), 0.4 * sc, 0, 7); ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fill();
  // surfaces
  const paY = (PH - 40.3) / 2;
  ctx.strokeRect(wx(0), wy(paY), 16.5 * sc, 40.3 * sc);
  ctx.strokeRect(wx(PW - 16.5), wy(paY), 16.5 * sc, 40.3 * sc);
  // cages (largeur but)
  const gY = (PH - 7.32) / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(wx(0), wy(gY), 2.2 * sc, 7.32 * sc); ctx.fillRect(wx(PW - 2.2), wy(gY), 2.2 * sc, 7.32 * sc);
  ctx.strokeRect(wx(0), wy(gY), 2.2 * sc, 7.32 * sc); ctx.strokeRect(wx(PW - 2.2), wy(gY), 2.2 * sc, 7.32 * sc);
}

function frameAt(time) {
  const f = replay.frames; if (!f.length) return null;
  const last = f[f.length-1].t; const tt = Math.min(time, last);
  let i = 0; while (i+1 < f.length && f[i+1].t <= tt) i++;
  const a = f[i], b = f[Math.min(i+1, f.length-1)];
  const span = Math.max(0.0001, b.t - a.t); const k = Math.min(1, Math.max(0, (tt - a.t)/span));
  return { a, b, k, done: time >= last };
}

function render() {
  requestAnimationFrame(render);
  if (!replay) return;
  const time = paused ? (window._pt||0) : ((performance.now() - startT)/1000) * speed;
  window._pt = time;
  const fr = frameAt(time); if (!fr) return;
  const { a, b, k } = fr;
  const ballX = a.ball.x + (b.ball.x - a.ball.x)*k;
  const ballY = a.ball.y + (b.ball.y - a.ball.y)*k;

  // Caméra : suit le ballon en douceur, bornée pour rester sur le terrain.
  if (follow) {
    const tx = Math.min(Math.max(ballX, FVW/2), PW - FVW/2);
    const ty = Math.min(Math.max(ballY, FVH/2), PH - FVH/2);
    camCX += (tx - camCX) * 0.08; camCY += (ty - camCY) * 0.08;
  } else { camCX = PW/2; camCY = PH/2; }

  drawPitch();
  const sc = scale();
  const pr = Math.min(13, Math.max(7, sc * 0.55));   // rayon joueur adapté au zoom
  // joueurs
  for (let n = 0; n < a.players.length && n < b.players.length; n++) {
    const pa = a.players[n], pb = b.players[n];
    const x = wx(pa.x + (pb.x - pa.x)*k), y = wy(pa.y + (pb.y - pa.y)*k);
    const hasBall = pa.hasBall || pb.hasBall;
    ctx.beginPath(); ctx.arc(x, y, hasBall ? pr*1.2 : pr, 0, 7);
    ctx.fillStyle = pa.side === 'home' ? HOME_COLOR : AWAY_COLOR; ctx.fill();
    ctx.lineWidth = 1.2; ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(pr)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(JERSEY[pa.slot] ?? (pa.slot+1), x, y);
  }
  // ballon (avec hauteur : ombre au sol + ballon soulevé/grossi quand il est en l'air)
  const bz = (a.ball.z || 0) + ((b.ball.z || 0) - (a.ball.z || 0)) * k;
  const bx = wx(ballX), by = wy(ballY);
  const br = Math.min(7, Math.max(4, sc * 0.3));
  if (bz > 0.3) {
    ctx.beginPath(); ctx.ellipse(bx, by, br * 0.95, br * 0.5, 0, 0, 7);
    ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fill();
  }
  const drawY = by - bz * sc * 0.35;                       // décalage visuel vers le haut
  ctx.beginPath(); ctx.arc(bx, drawY, br * (1 + Math.min(bz / 9, 0.5)), 0, 7);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.lineWidth = 0.8; ctx.strokeStyle = '#000'; ctx.stroke();
  // ── Remise en jeu (balle arrêtée) : anneau au point + anneau sur le tireur + bandeau ──
  if (a.sp) {
    const sp = a.sp;
    const pulse = 1 + 0.22 * Math.sin(time * 6);
    ctx.beginPath(); ctx.arc(wx(sp.x), wy(sp.y), pr * 1.5 * pulse, 0, 7);
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255,215,0,0.85)'; ctx.stroke();
    for (let n = 0; n < a.players.length && n < b.players.length; n++) {
      const pa = a.players[n], pb = b.players[n];
      if (pa.slot === sp.slot && pa.side === sp.side) {
        const tx = wx(pa.x + (pb.x - pa.x) * k), ty = wy(pa.y + (pb.y - pa.y) * k);
        ctx.beginPath(); ctx.arc(tx, ty, pr * 1.7, 0, 7);
        ctx.lineWidth = 2.5; ctx.strokeStyle = '#FFD700'; ctx.stroke();
        break;
      }
    }
    const LAB = { throwin: 'Touche', freekick: 'Coup franc', corner: 'Corner', goalkick: 'Dégagement (6 m)' };
    const label = (LAB[sp.type] || 'Remise en jeu') + (sp.slot >= 0 ? '  •  n°' + (JERSEY[sp.slot] ?? (sp.slot + 1)) : '');
    ctx.font = 'bold 17px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = 'rgba(0,0,0,0.62)'; ctx.fillRect(W / 2 - tw / 2 - 14, 12, tw + 28, 30);
    ctx.fillStyle = '#FFD700'; ctx.fillText(label, W / 2, 28);
  }
  // ── CAUSE de l'arrêt de jeu (Faute / Arrêt / Contré / Hors-jeu…) affichée à l'endroit de l'action ──
  if (a.cause) {
    const cx = wx(a.cause.x), cy = Math.max(22, wy(a.cause.y) - 18);
    ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const tw = ctx.measureText(a.cause.txt).width;
    ctx.fillStyle = 'rgba(220,38,38,0.9)'; ctx.fillRect(cx - tw / 2 - 9, cy - 13, tw + 18, 24);
    ctx.fillStyle = '#fff'; ctx.fillText(a.cause.txt, cx, cy);
  }
  // score / minute
  document.getElementById('score').textContent = `${a.sh} – ${a.sa}`;
  document.getElementById('min').textContent = Math.min(90, Math.round(time/360*90)) + "'";
}

document.getElementById('cam').onclick = (e) => { follow = !follow; e.target.textContent = follow ? '🗺️ Vue terrain' : '🔍 Vue ballon'; };
document.getElementById('regen').onclick = () => { seed++; generate(); paused = false; document.getElementById('pause').textContent = 'Pause'; };
document.getElementById('pause').onclick = (e) => {
  paused = !paused;
  if (!paused) startT = performance.now() - (window._pt/speed)*1000;
  e.target.textContent = paused ? 'Lecture' : 'Pause';
};
document.getElementById('speed').oninput = (e) => {
  const old = window._pt || 0; speed = parseFloat(e.target.value);
  startT = performance.now() - (old/speed)*1000;
};

const feed = document.getElementById('feed');
if (!window.SimEngine) {
  feed.style.color = '#fca5a5';
  feed.textContent = '⚠️ engine.js non chargé (SimEngine introuvable)';
} else {
  try {
    generate();
    render();
    feed.textContent = '✅ ' + (replay ? replay.frames.length : 0) + ' frames — lecture en cours';
  } catch (e) {
    feed.style.color = '#fca5a5';
    feed.textContent = '⚠️ ' + (e && e.message ? e.message : e);
  }
}
})();
</script>
</body>
</html>
